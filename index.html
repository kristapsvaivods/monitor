<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalve Coffee Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        .header-font { font-family: 'Playfair Display', sans-serif; }
        .coffee-bg { background: linear-gradient(135deg, #8d5524 0%, #5c3317 100%); }
        .news-card { transition: all 0.2s ease; }
        .news-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-200 min-h-screen">
    <!-- Header -->
    <div class="coffee-bg text-white py-8">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-white rounded-3xl flex items-center justify-center text-5xl shadow-lg">☕</div>
                <div>
                    <h1 class="header-font text-4xl tracking-tight">Kalve Coffee Monitor</h1>
                    <p class="text-amber-100 opacity-90">Auto-updated Latvian news + Stock</p>
                </div>
            </div>
            <div class="text-sm font-medium">
                Last updated: <span id="last-updated" class="font-mono text-amber-200"></span>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <!-- Stock Chart -->
        <div class="mb-12 bg-neutral-900 rounded-3xl p-6 border border-neutral-800">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-semibold">KALVE Akcija — Nasdaq Riga</h2>
                <a href="https://nasdaqbaltic.com/statistics/en/instrument/LV0000102234" target="_blank" 
                   class="text-xs text-emerald-400 hover:underline flex items-center gap-1">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> Nasdaq Baltic
                </a>
            </div>
            <div class="rounded-2xl overflow-hidden border border-neutral-700 bg-black">
                <iframe 
                    src="https://www.tradingview.com/widgetembed/?symbol=OMXRSE%3AKALVE&interval=D&theme=dark&style=1&hide_side_toolbar=0&hide_top_toolbar=0&hide_legend=1&width=100%&height=440" 
                    width="100%" 
                    height="240" 
                    frameborder="0" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <!-- News Section -->
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
            <i class="fa-solid fa-newspaper text-amber-300"></i>
            Jaunākās ziņas par Kalve Coffee
        </h2>

        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- News cards will be inserted here by JavaScript -->
        </div>

        <div class="text-center text-neutral-500 text-xs mt-16">
            Powered by GitHub Actions • Data scraped from db.lv, delfi.lv, la.lv and others
        </div>
    </div>

    <script>
        async function loadNews() {
            try {
                const response = await fetch('data/news.json?t=' + Date.now()); // prevent cache
                if (!response.ok) throw new Error("No data yet");
                
                const data = await response.json();
                
                // Update timestamp
                document.getElementById('last-updated').textContent = data.lastUpdated || '—';

                // Render news cards
                const container = document.getElementById('news-container');
                container.innerHTML = data.articles.map(article => `
                    <a href="${article.link}" target="_blank" 
                       class="news-card block bg-neutral-900 rounded-3xl p-6 border border-neutral-800 hover:border-amber-300/30">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-xs font-medium px-3 py-1 bg-amber-300/10 text-amber-300 rounded-full">
                                ${article.source}
                            </span>
                            <span class="text-xs text-neutral-500">${article.time}</span>
                        </div>
                        <h3 class="font-semibold leading-tight text-lg mb-2 line-clamp-3">${article.title}</h3>
                        ${article.summary ? `<p class="text-sm text-neutral-400 line-clamp-3">${article.summary}</p>` : ''}
                    </a>
                `).join('');
                
            } catch (err) {
                console.log("Waiting for first scrape...", err);
                document.getElementById('news-container').innerHTML = `
                    <div class="col-span-3 text-center py-20 text-neutral-400">
                        <i class="fa-solid fa-spinner fa-spin text-3xl mb-4"></i><br>
                        First scrape is running...<br>
                        <span class="text-xs">Check back in a few minutes or run the workflow manually</span>
                    </div>
                `;
            }
        }

        // Load news when page opens
        window.onload = loadNews;
    </script>
</body>
</html>
