<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalve Coffee Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        .header-font { font-family: 'Playfair Display', sans-serif; }
        .coffee-bg { background: linear-gradient(135deg, #8d5524 0%, #5c3317 100%); }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-200">
    <div class="coffee-bg text-white py-8">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-white rounded-3xl flex items-center justify-center text-5xl">☕</div>
                <div>
                    <h1 class="header-font text-4xl">Kalve Coffee Monitor</h1>
                    <p class="text-amber-100">Latvian news + Stock chart</p>
                </div>
            </div>
            <div class="text-sm">Updated: <span class="font-mono" id="last-updated">14. aprīlis 2026</span></div>
        </div>
    </div>
<!-- KALVE STOCK CHART - Replace the entire chart block with this -->
<!-- KALVE STOCK SECTION - Dynamic Price + Small Chart -->
<div class="mb-12 bg-neutral-900 rounded-3xl p-6 border border-neutral-800">
    <div class="flex flex-col lg:flex-row gap-6">
        
        <!-- Small Chart -->
        <div class="flex-1">
            <div class="text-sm text-neutral-400 mb-2">Dienas grafiks</div>
            <div class="tradingview-widget-container rounded-2xl overflow-hidden border border-neutral-700 bg-neutral-950" style="height: 320px;">
                <div class="tradingview-widget-container__widget" style="height: 100%;"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                {
                  "width": "100%",
                  "height": "100%",
                  "symbol": "OMXRSE:KALVE",
                  "interval": "D",
                  "timezone": "Europe/Riga",
                  "theme": "dark",
                  "style": "1",
                  "locale": "lv",
                  "hide_top_toolbar": true,
                  "hide_legend": true,
                  "hide_side_toolbar": true,
                  "allow_symbol_change": false
                }
                </script>
            </div>
        </div>

        <!-- Dynamic Price Box -->
        <div class="lg:w-80 bg-neutral-950 border border-neutral-700 rounded-3xl p-8 flex flex-col justify-center">
            <div class="text-xs uppercase tracking-widest text-neutral-400 mb-1">Pašreizējā cena</div>
            
            <div class="flex items-baseline gap-3">
                <span id="kalve-price" class="text-5xl font-bold">14.70</span>
                <span id="kalve-change" class="text-3xl font-medium">0.00%</span>
            </div>
            
            <div id="kalve-date" class="text-neutral-400 text-sm mt-1">Atjaunināts: —</div>

            <div class="mt-8 pt-6 border-t border-neutral-700 text-xs space-y-2">
                <div class="flex justify-between">
                    <span class="text-neutral-400">Atvērums</span>
                    <span id="kalve-open">—</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-neutral-400">Dienas diapazons</span>
                    <span id="kalve-range">—</span>
                </div>
            </div>
            
            <a href="https://finance.yahoo.com/quote/KALVE.RG/" target="_blank"
               class="mt-8 text-center text-emerald-400 hover:text-emerald-300 text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                Skatīt pilnus datus Yahoo Finance
            </a>
        </div>
    </div>
</div>
</div>

        <!-- News Section -->
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
            <i class="fa-solid fa-newspaper text-amber-300"></i>
            Jaunākās ziņas par Kalve Coffee
        </h2>

        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- News will load here -->
        </div>

        <div class="mt-16 text-center text-neutral-500 text-xs">
            RSS-based monitor • Kalve Coffee expansion tracker
        </div>
    </div>

    <script>
        const newsData = [
            {
                source: "db.lv",
                title: "Kalve Coffee atklāj otro kafejnīcu Parīzē un plāno Lisabonu",
                link: "https://www.db.lv/",
                time: "14. aprīlis 2026",
                summary: "Uzņēmums turpina agresīvu starptautisko paplašināšanos Eiropā."
            },
            {
                source: "delfi.lv",
                title: "Kalve Coffee apgrozījums 2025. gadā pieaudzis par 55%",
                link: "https://www.delfi.lv/",
                time: "Februāris 2026",
                summary: "Spēcīgs pieaugums kafejnīcu un e-komercijas segmentos."
            },
            {
                source: "tvnet.lv",
                title: "Kalve Coffee atver trešo kafejnīcu Tallinā",
                link: "https://www.tvnet.lv/",
                time: "2025",
                summary: "Golden Gate koncepts Igaunijā ir atvērts."
            },
            {
                source: "apollo.lv",
                title: "Kalve Coffee investē jaunā koncepta kafejnīcā Vecrīgā",
                link: "https://www.apollo.lv/",
                time: "2025",
                summary: "90 000 eiro ieguldījums Espresso Room."
            }
        ];

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = newsData.map(item => `
                <a href="${item.link}" target="_blank" class="block bg-neutral-900 rounded-3xl p-6 hover:bg-neutral-800 transition-all border border-neutral-800 hover:border-amber-300/30">
                    <div class="flex justify-between text-xs mb-3">
                        <span class="px-3 py-1 bg-amber-300/10 text-amber-300 rounded-full">${item.source}</span>
                        <span class="text-neutral-500">${item.time}</span>
                    </div>
                    <h3 class="font-semibold text-lg leading-tight mb-2">${item.title}</h3>
                    <p class="text-sm text-neutral-400">${item.summary}</p>
                </a>
            `).join('');
        }

        window.onload = () => {
            renderNews();
            document.getElementById('last-updated').textContent = new Date().toLocaleString('lv-LV', { timeZone: 'Europe/Riga' });
        };
    </script>
    <script>
// Dynamic KALVE stock price from Yahoo Finance
async function fetchKalvePrice() {
    try {
        const response = await fetch('https://query1.finance.yahoo.com/v7/finance/quote?symbols=KALVE.RG');
        const data = await response.json();
        const quote = data.quoteResponse.result[0];

        if (quote) {
            const price = quote.regularMarketPrice.toFixed(2);
            const change = quote.regularMarketChange.toFixed(2);
            const changePercent = quote.regularMarketChangePercent.toFixed(2);
            
            const isPositive = changePercent >= 0;
            
            document.getElementById('kalve-price').textContent = price;
            document.getElementById('kalve-change').textContent = `${isPositive ? '+' : ''}${changePercent}%`;
            document.getElementById('kalve-change').className = `text-3xl font-medium ${isPositive ? 'text-emerald-400' : 'text-red-400'}`;
            
            document.getElementById('kalve-date').textContent = `Atjaunināts: ${new Date(quote.regularMarketTime * 1000).toLocaleString('lv-LV')}`;
            
            // Optional: open and range
            document.getElementById('kalve-open').textContent = quote.regularMarketOpen ? quote.regularMarketOpen.toFixed(2) : '—';
            document.getElementById('kalve-range').textContent = `${quote.regularMarketDayLow ? quote.regularMarketDayLow.toFixed(2) : '—'} - ${quote.regularMarketDayHigh ? quote.regularMarketDayHigh.toFixed(2) : '—'}`;
        }
    } catch (err) {
        console.log("Could not fetch live price, using fallback");
        // Fallback values
        document.getElementById('kalve-price').textContent = "14.70";
        document.getElementById('kalve-change').textContent = "-0.68%";
        document.getElementById('kalve-change').className = "text-3xl font-medium text-red-400";
    }
}

// Run when page loads
window.onload = () => {
    fetchKalvePrice();
    // If you have other onload functions (like renderNews), call them here too
};
</script>
</body>
</html>
