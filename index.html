<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalve Coffee Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        .header-font { font-family: 'Playfair Display', sans-serif; }
        .coffee-bg { background: linear-gradient(135deg, #8d5524 0%, #5c3317 100%); }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-200">
    <div class="coffee-bg text-white py-8">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-white rounded-3xl flex items-center justify-center text-5xl">☕</div>
                <div>
                    <h1 class="header-font text-4xl">Kalve Coffee Monitor</h1>
                    <p class="text-amber-100">Latvian news + Stock chart</p>
                </div>
            </div>
            <div class="text-sm">Updated: <span class="font-mono" id="last-updated">14. aprīlis 2026</span></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <!-- Stock Chart - Fixed simple version -->
        <div class="mb-12 bg-neutral-900 rounded-3xl p-6 border border-neutral-800">
            <div class="flex justify-between mb-4">
                <h2 class="text-2xl font-semibold">KALVE Akcija — Nasdaq Riga</h2>
                <a href="https://nasdaqbaltic.com/statistics/en/instrument/LV0000102234" target="_blank" 
                   class="text-emerald-400 hover:underline text-sm">Nasdaq Baltic →</a>
            </div>
            <div class="rounded-2xl overflow-hidden border border-neutral-700 bg-neutral-950">
                <iframe src="https://www.tradingview.com/widgetembed/?symbol=OMXRSE%3AKALVE&interval=D&theme=dark&style=1&hide_side_toolbar=1&hide_top_toolbar=1&hide_legend=1&width=100%&height=440" 
                        width="100%" height="440" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <!-- News Section -->
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
            <i class="fa-solid fa-newspaper text-amber-300"></i>
            Jaunākās ziņas par Kalve Coffee
        </h2>

        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- News will load here -->
        </div>

        <div class="mt-16 text-center text-neutral-500 text-xs">
            RSS-based monitor • Kalve Coffee expansion tracker
        </div>
    </div>

    <script>
        const newsData = [
            {
                source: "db.lv",
                title: "Kalve Coffee atklāj otro kafejnīcu Parīzē un plāno Lisabonu",
                link: "https://www.db.lv/",
                time: "14. aprīlis 2026",
                summary: "Uzņēmums turpina agresīvu starptautisko paplašināšanos Eiropā."
            },
            {
                source: "delfi.lv",
                title: "Kalve Coffee apgrozījums 2025. gadā pieaudzis par 55%",
                link: "https://www.delfi.lv/",
                time: "Februāris 2026",
                summary: "Spēcīgs pieaugums kafejnīcu un e-komercijas segmentos."
            },
            {
                source: "tvnet.lv",
                title: "Kalve Coffee atver trešo kafejnīcu Tallinā",
                link: "https://www.tvnet.lv/",
                time: "2025",
                summary: "Golden Gate koncepts Igaunijā ir atvērts."
            },
            {
                source: "apollo.lv",
                title: "Kalve Coffee investē jaunā koncepta kafejnīcā Vecrīgā",
                link: "https://www.apollo.lv/",
                time: "2025",
                summary: "90 000 eiro ieguldījums Espresso Room."
            }
        ];

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = newsData.map(item => `
                <a href="${item.link}" target="_blank" class="block bg-neutral-900 rounded-3xl p-6 hover:bg-neutral-800 transition-all border border-neutral-800 hover:border-amber-300/30">
                    <div class="flex justify-between text-xs mb-3">
                        <span class="px-3 py-1 bg-amber-300/10 text-amber-300 rounded-full">${item.source}</span>
                        <span class="text-neutral-500">${item.time}</span>
                    </div>
                    <h3 class="font-semibold text-lg leading-tight mb-2">${item.title}</h3>
                    <p class="text-sm text-neutral-400">${item.summary}</p>
                </a>
            `).join('');
        }

        window.onload = () => {
            renderNews();
            document.getElementById('last-updated').textContent = new Date().toLocaleString('lv-LV', { timeZone: 'Europe/Riga' });
        };
    </script>
</body>
</html>
