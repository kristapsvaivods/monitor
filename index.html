<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalve Coffee Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        .header-font { font-family: 'Playfair Display', sans-serif; }
        .coffee-bg { background: linear-gradient(135deg, #8d5524 0%, #5c3317 100%); }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-200">
    <div class="coffee-bg text-white py-8">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-white rounded-3xl flex items-center justify-center text-5xl">☕</div>
                <div>
                    <h1 class="header-font text-4xl">Kalve Coffee Monitor</h1>
                    <p class="text-amber-100">Auto RSS + Live Price</p>
                </div>
            </div>
            
            <!-- Dynamic KALVE Price (Top Right) -->
            <div class="bg-neutral-900/80 backdrop-blur-md px-6 py-4 rounded-3xl border border-neutral-700 text-right min-w-[200px]">
                <div class="text-xs uppercase tracking-widest text-neutral-400">KALVE cena</div>
                <div class="flex items-baseline justify-end gap-3">
                    <span id="kalve-price" class="text-4xl font-bold">14.70</span>
                    <span id="kalve-change" class="text-2xl font-medium">0.00%</span>
                </div>
                <div id="kalve-date" class="text-xs text-neutral-400 mt-1">Atjaunināts: —</div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
            <i class="fa-solid fa-newspaper text-amber-300"></i>
            Jaunākās ziņas par Kalve Coffee
        </h2>

        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-3 text-center py-12 text-neutral-400" id="loading">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-4"></i><br>
                Ielādē RSS ziņas...
            </div>
        </div>
    </div>

    <script>
        // === Dynamic KALVE Price ===
        async function fetchKalvePrice() {
            try {
                const res = await fetch('https://query1.finance.yahoo.com/v7/finance/quote?symbols=KALVE.RG');
                const data = await res.json();
                const q = data.quoteResponse.result[0];
                if (q) {
                    const price = q.regularMarketPrice.toFixed(2);
                    const pct = q.regularMarketChangePercent.toFixed(2);
                    const isUp = pct >= 0;

                    document.getElementById('kalve-price').textContent = price;
                    const changeEl = document.getElementById('kalve-change');
                    changeEl.textContent = `${isUp ? '+' : ''}${pct}%`;
                    changeEl.className = `text-2xl font-medium ${isUp ? 'text-emerald-400' : 'text-red-400'}`;
                    document.getElementById('kalve-date').textContent = `Atjaunināts: ${new Date().toLocaleString('lv-LV')}`;
                }
            } catch (e) {
                console.log("Price fetch failed");
            }
        }

        // === Automatic RSS Fetch using public proxy ===
        const rssFeeds = [
            "https://www.delfi.lv/rss",
            "https://www.tvnet.lv/rss",
            "https://www.db.lv/rss",
            "https://eng.lsm.lv/rss/?lang=en&catid=315"   // English LSM for broader coverage
        ];

        async function fetchRSS() {
            const container = document.getElementById('news-container');
            const loading = document.getElementById('loading');
            let foundArticles = 0;

            for (const feedUrl of rssFeeds) {
                try {
                    // Use allorigins proxy to bypass CORS
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`;
                    const res = await fetch(proxyUrl);
                    const data = await res.json();
                    const text = data.contents;

                    // Simple XML parsing (we look for <item> tags)
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, "text/xml");
                    const items = xml.querySelectorAll("item");

                    items.forEach(item => {
                        const title = item.querySelector("title") ? item.querySelector("title").textContent : "";
                        const link = item.querySelector("link") ? item.querySelector("link").textContent : "#";
                        const pubDate = item.querySelector("pubDate") ? item.querySelector("pubDate").textContent : "";
                        const description = item.querySelector("description") ? item.querySelector("description").textContent : "";

                        if (title.toLowerCase().includes("kalve") || description.toLowerCase().includes("kalve")) {
                            const articleHTML = `
                                <a href="${link}" target="_blank" class="block bg-neutral-900 rounded-3xl p-6 hover:bg-neutral-800 transition-colors border border-neutral-800 hover:border-amber-300/30">
                                    <div class="flex justify-between text-xs mb-3">
                                        <span class="px-3 py-1 bg-amber-300/10 text-amber-300 rounded-full">${new URL(feedUrl).hostname}</span>
                                        <span class="text-neutral-500">${new Date(pubDate).toLocaleDateString('lv-LV')}</span>
                                    </div>
                                    <h3 class="font-semibold leading-tight mb-2">${title}</h3>
                                    <p class="text-sm text-neutral-400 line-clamp-3">${description.replace(/<[^>]+>/g, '').substring(0, 160)}...</p>
                                </a>
                            `;
                            container.innerHTML += articleHTML;
                            foundArticles++;
                        }
                    });
                } catch (err) {
                    console.log(`Failed to load ${feedUrl}`);
                }
            }

            loading.style.display = 'none';

            if (foundArticles === 0) {
                container.innerHTML = `
                    <div class="col-span-3 text-center py-16 text-neutral-400">
                        Pašlaik nav jaunu ziņu ar "Kalve".<br>
                        <span class="text-xs">Pārbaudi vēlāk vai pievieno vairāk avotu.</span>
                    </div>`;
            }
        }

        // Initialize everything
        window.onload = () => {
            fetchKalvePrice();
            fetchRSS();
        };
    </script>
</body>
</html>
