name: Kalve Scraper

on:
  schedule:
    - cron: '0 */6 * * *'      # Runs every 6 hours
  workflow_dispatch:           # Allows manual run from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: scraper/package.json

      - name: Install dependencies
        run: cd scraper && npm ci

      - name: Run scraper
        run: cd scraper && node scrape.js

      - name: Commit and push news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git commit -m "Update Kalve news from scraper [skip ci]" || echo "No changes"
          git push
